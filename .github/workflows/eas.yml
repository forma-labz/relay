name: EAS release

on:
  workflow_dispatch:
    inputs:
      action:
        type: choice
        options: [build, update, submit]
        required: true
      profile:
        type: choice
        options: [development, preview, internal, simulator, production]
        default: preview
        required: true

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    defaults:
      run:
        working-directory: apps/mobile
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}
      - run: npm ci
        working-directory: .
      - name: Build
        if: inputs.action == 'build'
        run: eas build --platform all --profile "${{ inputs.profile }}" --non-interactive
      - name: Update
        if: inputs.action == 'update'
        run: eas update --channel "${{ inputs.profile }}" --message "${{ github.sha }}" --non-interactive
      - name: Submit
        if: inputs.action == 'submit'
        run: eas submit --platform all --profile production --latest --non-interactive
