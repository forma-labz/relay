name: EAS release

on:
  workflow_dispatch:
    inputs:
      action:
        type: choice
        options: [build, update, submit]
        required: true
      profile:
        type: choice
        options: [development, preview, internal, simulator, production]
        default: preview
        required: true
      platform:
        type: choice
        options: [all, ios, android]
        default: all
        required: true

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    defaults:
      run:
        working-directory: apps/mobile
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}
      - name: Install dependencies
        run: npm ci
        working-directory: .
      - name: Verify Expo project
        run: npx expo config --type public
        env:
          EXPO_PLATFORM: native
          EXPO_PUBLIC_EAS_PROJECT_ID: ${{ secrets.EXPO_PUBLIC_EAS_PROJECT_ID }}
          EXPO_PUBLIC_SUPABASE_URL: ${{ secrets.EXPO_PUBLIC_SUPABASE_URL }}
          EXPO_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.EXPO_PUBLIC_SUPABASE_ANON_KEY }}
          EXPO_PUBLIC_RELAY_API_URL: ${{ secrets.EXPO_PUBLIC_RELAY_API_URL }}
          EXPO_PUBLIC_GOOGLE_WEB_CLIENT_ID: ${{ secrets.EXPO_PUBLIC_GOOGLE_WEB_CLIENT_ID }}
          EXPO_PUBLIC_MICROSOFT_CLIENT_ID: ${{ secrets.EXPO_PUBLIC_MICROSOFT_CLIENT_ID }}
          EXPO_OWNER: ${{ secrets.EXPO_OWNER }}
      - name: Build
        if: inputs.action == 'build'
        run: >
          eas build
          --platform "${{ inputs.platform }}"
          --profile "${{ inputs.profile }}"
          --non-interactive
        env:
          EXPO_PLATFORM: native
          EXPO_PUBLIC_EAS_PROJECT_ID: ${{ secrets.EXPO_PUBLIC_EAS_PROJECT_ID }}
          EXPO_PUBLIC_SUPABASE_URL: ${{ secrets.EXPO_PUBLIC_SUPABASE_URL }}
          EXPO_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.EXPO_PUBLIC_SUPABASE_ANON_KEY }}
          EXPO_PUBLIC_RELAY_API_URL: ${{ secrets.EXPO_PUBLIC_RELAY_API_URL }}
          EXPO_PUBLIC_GOOGLE_WEB_CLIENT_ID: ${{ secrets.EXPO_PUBLIC_GOOGLE_WEB_CLIENT_ID }}
          EXPO_PUBLIC_MICROSOFT_CLIENT_ID: ${{ secrets.EXPO_PUBLIC_MICROSOFT_CLIENT_ID }}
          EXPO_OWNER: ${{ secrets.EXPO_OWNER }}
      - name: Update
        if: inputs.action == 'update'
        run: >
          eas update
          --channel "${{ inputs.profile }}"
          --message "${{ github.sha }}"
          --non-interactive
        env:
          EXPO_PLATFORM: native
          EXPO_PUBLIC_EAS_PROJECT_ID: ${{ secrets.EXPO_PUBLIC_EAS_PROJECT_ID }}
          EXPO_PUBLIC_SUPABASE_URL: ${{ secrets.EXPO_PUBLIC_SUPABASE_URL }}
          EXPO_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.EXPO_PUBLIC_SUPABASE_ANON_KEY }}
          EXPO_PUBLIC_RELAY_API_URL: ${{ secrets.EXPO_PUBLIC_RELAY_API_URL }}
          EXPO_PUBLIC_GOOGLE_WEB_CLIENT_ID: ${{ secrets.EXPO_PUBLIC_GOOGLE_WEB_CLIENT_ID }}
          EXPO_PUBLIC_MICROSOFT_CLIENT_ID: ${{ secrets.EXPO_PUBLIC_MICROSOFT_CLIENT_ID }}
          EXPO_OWNER: ${{ secrets.EXPO_OWNER }}
      - name: Submit
        if: inputs.action == 'submit'
        run: >
          eas submit
          --platform "${{ inputs.platform }}"
          --profile production
          --latest
          --non-interactive
